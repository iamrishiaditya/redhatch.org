<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <style>
    /* Reset everything */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #000000; /* Completely black background */
      color: #00ff41; /* Classic terminal/matrix green */
      font-family: 'Consolas', 'Courier New', monospace;
      height: 100vh;
      display: flex;
      justify-content: center; /* Center horizontally */
      align-items: center; /* Center vertically */
      overflow: hidden; /* No scrollbars */
    }

    .terminal-container {
      font-size: 2rem; /* Size of the text */
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.6); /* Adds a subtle glowing "CRT screen" effect */
      text-align: center;
      letter-spacing: 2px;
    }

    /* The blinking terminal block cursor */
    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1em;
      background-color: #00ff41;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
      margin-left: 5px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Only the text and the cursor exist on the screen -->
  <div class="terminal-container">
    <span id="typewriter"></span><span class="cursor"></span>
  </div>

  <script>
    // The text you want to display in the center
    const textToType = "admin@redhatch:~$ INITIALIZING SYSTEM...";
    const textElement = document.getElementById("typewriter");
    let index = 0;

    // Function to simulate realistic typing
    function typeWriter() {
      if (index < textToType.length) {
        textElement.innerHTML += textToType.charAt(index);
        index++;
        
        // Randomize the typing speed slightly to look like a real human/computer typing
        const typingSpeed = Math.random() * 50 + 50; 
        setTimeout(typeWriter, typingSpeed);
      } else {
        // Optional: After typing is done, switch to a "Ready" state after 2 seconds
        setTimeout(() => {
          textElement.innerHTML = "admin@redhatch:~$ SYSTEM READY.";
        }, 2000);
      }
    }

    // Start the typing effect 1 second after opening the page
    setTimeout(typeWriter, 1000);
  </script>

</body>
</html>
