<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REDHATCH - Crazy Street Games</title>
  
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <img src="logo.png" alt="" class="logo-img" onerror="this.style.display='none'">
      <span>REDHATCH</span>
    </div>
    <div class="nav-icons">
        <span>🐦</span> <span>✉️</span>
    </div>
  </nav>

  <header class="hero">
    <h1>CRAZY STREET GAMES.<br><span>ANYWHERE.</span></h1>
    <p>Redhatch turns your entire city into a massive, interactive playground. For tag, hide & seek, and team battles. Stop staring, start running.</p>
    
    <div class="cta-container">
      <a href="https://play.google.com/store/apps/details?id=cloud.blamegame.android" target="_blank" class="play-store-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
      </a>
    </div>
  </header>

  <section class="features-row-container">
    <div class="features-row">
      <img src="screenshot1.png" alt="Feature 1" class="app-card-img">
      <img src="screenshot2.png" alt="Feature 2" class="app-card-img">
      <img src="screenshot3.png" alt="Feature 3" class="app-card-img">
      <img src="screenshot4.png" alt="Feature 4" class="app-card-img">
      <img src="screenshot5.png" alt="Feature 5" class="app-card-img">
      <img src="screenshot6.png" alt="Feature 6" class="app-card-img">
      <img src="screenshot7.png" alt="Feature 7" class="app-card-img">
    </div>
  </section>

</body>
</html>
